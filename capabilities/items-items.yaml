naftiko: 1.0.0-alpha2
info:
  label: Taboola Backstage Campaign Items
  description: |-
    Self-contained Naftiko capability for managing campaign items (creatives) and performance
    video items belonging to Taboola Realize campaigns.
  tags:
    - Taboola
    - Advertising
    - Items
    - Creatives
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TABOOLA_ACCESS_TOKEN: TABOOLA_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: items
      baseUri: https://backstage.taboola.com/backstage/api/1.0
      description: Taboola campaign items business capability.
      resources:
        - name: items
          path: /{account_id}/campaigns/{campaign_id}/items/
          operations:
            - name: getAllItems
              method: GET
              description: Get all items for the specified campaign.
              outputRawFormat: json
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                - name: campaign_id
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: createItem
              method: POST
              description: Create a new campaign item.
              outputRawFormat: json
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: bearer
        value: '{{env.TABOOLA_ACCESS_TOKEN}}'
        placement: header
  exposes:
    - type: rest
      namespace: items-rest
      port: 8080
      description: REST adapter for Taboola Campaign Items.
      resources:
        - path: /v1/{account_id}/campaigns/{campaign_id}/items
          name: items
          operations:
            - method: GET
              name: getAllItems
              call: items.getAllItems
              with:
                account_id: rest.path.account_id
                campaign_id: rest.path.campaign_id
              outputParameters:
                - type: object
                  mapping: $.
            - method: POST
              name: createItem
              call: items.createItem
              with:
                account_id: rest.path.account_id
                campaign_id: rest.path.campaign_id
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: items-mcp
      port: 9090
      transport: http
      description: MCP adapter for Taboola Campaign Items.
      tools:
        - name: taboola-list-items
          description: List items for a Taboola campaign.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: items.getAllItems
          with:
            account_id: tools.account_id
            campaign_id: tools.campaign_id
          outputParameters:
            - type: object
              mapping: $.
        - name: taboola-create-item
          description: Create a new Taboola campaign item.
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: items.createItem
          with:
            account_id: tools.account_id
            campaign_id: tools.campaign_id
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
