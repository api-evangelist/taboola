naftiko: 1.0.0-alpha2
info:
  label: Taboola Backstage Reports
  description: |-
    Self-contained Naftiko capability for retrieving Taboola Realize campaign performance
    reports across multiple breakdown dimensions including day, site, country, platform,
    and ad/item.
  tags:
    - Taboola
    - Reporting
    - Analytics
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TABOOLA_ACCESS_TOKEN: TABOOLA_ACCESS_TOKEN
capability:
  consumes:
    - type: http
      namespace: reports
      baseUri: https://backstage.taboola.com/backstage/api/1.0
      description: Taboola Reports business capability.
      resources:
        - name: campaignSummary
          path: /{account_id}/reports/campaign-summary/dimensions/{dimension}
          operations:
            - name: getCampaignSummary
              method: GET
              description: Get a campaign summary report.
              outputRawFormat: json
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                - name: dimension
                  in: path
                  type: string
                  required: true
                - name: start_date
                  in: query
                  type: string
                  required: true
                - name: end_date
                  in: query
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: topContent
          path: /{account_id}/reports/top-campaign-content/dimensions/item_breakdown
          operations:
            - name: getTopContent
              method: GET
              description: Get a top campaign content report.
              outputRawFormat: json
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                - name: start_date
                  in: query
                  type: string
                  required: true
                - name: end_date
                  in: query
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: bearer
        value: '{{env.TABOOLA_ACCESS_TOKEN}}'
        placement: header
  exposes:
    - type: mcp
      namespace: reports-mcp
      port: 9090
      transport: http
      description: MCP adapter for Taboola Reports.
      tools:
        - name: taboola-campaign-summary
          description: Get a Taboola campaign summary report.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: reports.getCampaignSummary
          with:
            account_id: tools.account_id
            dimension: tools.dimension
            start_date: tools.start_date
            end_date: tools.end_date
          outputParameters:
            - type: object
              mapping: $.
        - name: taboola-top-content
          description: Get top performing Taboola creative items.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: reports.getTopContent
          with:
            account_id: tools.account_id
            start_date: tools.start_date
            end_date: tools.end_date
          outputParameters:
            - type: object
              mapping: $.
